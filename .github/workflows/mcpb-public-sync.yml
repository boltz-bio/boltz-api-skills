name: Sync mcpb to public repo

# When the mcpb version on main changes, mirror plugins/boltz-mcpb into
# boltz-bio/boltz-mcpb as a PR. Triggers off plugins/boltz-mcpb/manifest.json
# changes and skips when .version did not change (so non-version edits do not
# spam the public repo).
#
# Authentication: uses the boltz-mcpb-publisher GitHub App, which must be
# installed on both boltz-api-skills and boltz-mcpb.

on:
  push:
    branches: [main]
    paths:
      - 'plugins/boltz-mcpb/manifest.json'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: ver
        run: |
          set -euo pipefail
          current=$(jq -r .version plugins/boltz-mcpb/manifest.json)
          previous=$(git show HEAD~1:plugins/boltz-mcpb/manifest.json 2>/dev/null | jq -r .version || echo "")
          if [[ "$current" == "$previous" ]]; then
            echo "Version unchanged ($current) — skipping public sync."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version changed: ${previous:-<none>} → ${current}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$current" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint App token (scoped to release repo)
        if: steps.ver.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MCPB_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.MCPB_PUBLISHER_APP_PRIVATE_KEY }}
          owner: boltz-bio
          repositories: boltz-mcpb

      - name: Run release script
        if: steps.ver.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config --global user.name "boltz-mcpb-publisher[bot]"
          git config --global user.email "${{ secrets.MCPB_PUBLISHER_APP_ID }}+boltz-mcpb-publisher[bot]@users.noreply.github.com"
          bash scripts/release-mcpb-repo.sh
