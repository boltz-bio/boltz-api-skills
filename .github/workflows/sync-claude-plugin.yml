name: Sync Claude plugin copy

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Regenerate plugins/boltz
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate distribution surfaces
        run: scripts/generate-surfaces.sh
      - name: Commit regenerated plugin copy
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- plugins/boltz)" ]]; then
            echo "plugins/boltz is already in sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/boltz
          git commit -m "chore(claude): sync boltz plugin copy"
          git push origin "HEAD:${GITHUB_REF_NAME}"
