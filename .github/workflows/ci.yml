name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code validator
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate Claude Code plugins
        run: |
          claude plugin validate .
          claude plugin validate plugins/boltz
          claude plugin validate surfaces/claude-code-cli
      - name: JSON syntax for Claude plugins
        run: |
          jq empty .claude-plugin/marketplace.json
          jq empty plugins/boltz/.claude-plugin/plugin.json
          jq empty surfaces/claude-code-cli/.claude-plugin/plugin.json
      - name: JSON syntax for Codex plugins
        run: |
          jq empty surfaces/codex-cli/.codex-plugin/plugin.json
          jq empty plugins/boltz-api-cli/.codex-plugin/plugin.json
      - name: JSON syntax for Gemini extensions
        run: |
          jq empty surfaces/gemini-cli/gemini-extension.json
      - name: JSON syntax for MCPB manifests
        run: |
          jq empty surfaces/mcpb/manifest.json
          jq empty plugins/boltz-mcpb/manifest.json

  test-mcpb:
    name: Test MCPB server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install MCPB dependencies
        run: npm ci
        working-directory: surfaces/mcpb
      - name: Test MCPB server
        run: npm test
        working-directory: surfaces/mcpb
      - name: Validate MCPB manifest
        run: npx --yes @anthropic-ai/mcpb@2.1.2 validate manifest.json
        working-directory: surfaces/mcpb

  verify-symlinks:
    name: Verify skill symlinks resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every surface's skill symlinks
        run: |
          set -euo pipefail
          for surface in claude-code-cli codex-cli gemini-cli; do
            [[ -f "surfaces/$surface/skills/boltz-cli-setup/references/sandbox.md" ]] || {
              echo "::error::missing or broken symlink: surfaces/$surface/skills/boltz-cli-setup/references/sandbox.md"
              exit 1
            }
            for skill in boltz-structure-and-binding boltz-small-molecule-screen \
                         boltz-small-molecule-design boltz-protein-screen \
                         boltz-protein-design boltz-check-status; do
              [[ -f "surfaces/$surface/skills/$skill/SKILL.md" ]] || {
                echo "::error::missing or broken symlink: surfaces/$surface/skills/$skill/SKILL.md"
                exit 1
              }
              [[ -f "surfaces/$surface/skills/$skill/references/api.md" ]] || {
                echo "::error::missing or broken symlink: surfaces/$surface/skills/$skill/references/api.md"
                exit 1
              }
              if [[ "$skill" == "boltz-check-status" ]]; then
                extra_ref="resume.md"
              else
                extra_ref="results.md"
              fi
              [[ -f "surfaces/$surface/skills/$skill/references/$extra_ref" ]] || {
                echo "::error::missing or broken symlink: surfaces/$surface/skills/$skill/references/$extra_ref"
                exit 1
              }
            done
          done
          echo "All skill and reference symlinks resolved."

  verify-claude-plugin-copy:
    name: Verify generated distribution surfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated surfaces
        run: scripts/verify-generated.sh

  test-exploration-scripts:
    name: Test protein-design exploration scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install script dependencies
        run: pip install -r core/skills/cli/boltz-protein-design/scripts/requirements.txt
      - name: Run unit tests
        run: python3 -m unittest discover -s core/skills/cli/boltz-protein-design/tests -v

  package-plugins:
    name: Package plugin artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Package plugin artifacts
        run: scripts/package-plugins.sh
      - name: Verify packaged skills are self-contained
        run: |
          set -euo pipefail
          TMPDIR_CHECK="$(mktemp -d)"
          unzip -q "dist/claude-code-cli-"*.zip -d "$TMPDIR_CHECK/claude-code-cli"
          test -f "$TMPDIR_CHECK/claude-code-cli/skills/boltz-check-status/SKILL.md"
          test ! -L "$TMPDIR_CHECK/claude-code-cli/skills/boltz-check-status/SKILL.md"
          test -f "$TMPDIR_CHECK/claude-code-cli/skills/boltz-check-status/references/api.md"
          unzip -q "dist/boltz-api-cli-"*.zip -d "$TMPDIR_CHECK/boltz-api-cli"
          test -f "$TMPDIR_CHECK/boltz-api-cli/.codex-plugin/plugin.json"
          test -f "$TMPDIR_CHECK/boltz-api-cli/assets/app-icon.png"
          test -f "$TMPDIR_CHECK/boltz-api-cli/skills/boltz-check-status/SKILL.md"
          test ! -L "$TMPDIR_CHECK/boltz-api-cli/skills/boltz-check-status/SKILL.md"
          test -f "$TMPDIR_CHECK/boltz-api-cli/skills/boltz-check-status/references/api.md"
          unzip -q "dist/boltz-gemini-cli-"*.zip -d "$TMPDIR_CHECK/boltz-gemini-cli"
          test -f "$TMPDIR_CHECK/boltz-gemini-cli/gemini-extension.json"
          test -f "$TMPDIR_CHECK/boltz-gemini-cli/GEMINI.md"
          test -f "$TMPDIR_CHECK/boltz-gemini-cli/skills/boltz-check-status/SKILL.md"
          test ! -L "$TMPDIR_CHECK/boltz-gemini-cli/skills/boltz-check-status/SKILL.md"
          test -f "$TMPDIR_CHECK/boltz-gemini-cli/skills/boltz-check-status/references/api.md"
      - name: Verify MCPB artifact
        run: |
          set -euo pipefail
          test -f dist/boltz-mcpb-*.mcpb
          npx --yes @anthropic-ai/mcpb@2.1.2 info dist/boltz-mcpb-*.mcpb
