name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify-generated:
    name: Verify generated distribution surfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated surfaces
        run: scripts/verify-generated.sh

  build-mcp-server:
    name: Build MCP server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: core/mcp-server/go.sum
      - name: Build
        working-directory: core/mcp-server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist/bin/${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/bin/${{ matrix.goos }}-${{ matrix.goarch }}/boltz-compute-mcp${{ matrix.suffix }}" \
            ./cmd/boltz-compute-mcp
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/bin/${{ matrix.goos }}-${{ matrix.goarch }}/**
          if-no-files-found: error

  package-mcpb:
    name: Package MCPB bundle
    needs: build-mcp-server
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install mcpb
        run: npm install -g @anthropic-ai/mcpb
      - uses: actions/download-artifact@v4
        with:
          name: mcp-darwin-arm64
          path: dist/bin/darwin-arm64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-darwin-amd64
          path: dist/bin/darwin-amd64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-windows-amd64
          path: dist/bin/windows-amd64
      - name: Pack MCPB
        run: scripts/package-mcpb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: boltz-compute-mcpb
          path: dist/*.mcpb
          if-no-files-found: error

  package-plugins:
    name: Package plugin surfaces
    needs: build-mcp-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mcp-darwin-arm64
          path: dist/bin/darwin-arm64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-darwin-amd64
          path: dist/bin/darwin-amd64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-linux-amd64
          path: dist/bin/linux-amd64
      - uses: actions/download-artifact@v4
        with:
          name: mcp-windows-amd64
          path: dist/bin/windows-amd64
      - name: Pack each surface
        run: scripts/package-plugins.sh
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [verify-generated, package-mcpb, package-plugins]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/boltz-compute-mcpb/*.mcpb
            dist/plugin-zips/*.zip
          generate_release_notes: true
