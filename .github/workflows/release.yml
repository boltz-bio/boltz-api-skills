name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  verify-generated:
    name: Verify generated distribution surfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify generated surfaces
        run: scripts/verify-generated.sh

  package-plugins:
    name: Package plugin surfaces
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Pack each surface
        run: scripts/package-plugins.sh
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-artifacts
          path: |
            dist/*.zip
            dist/*.mcpb
          if-no-files-found: error

  release:
    name: Publish release
    needs: [verify-generated, package-plugins]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/plugin-artifacts/*.zip
            dist/plugin-artifacts/*.mcpb
          generate_release_notes: true
